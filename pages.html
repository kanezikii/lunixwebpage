<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Linux 入门静态网页</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        h1 { color: #2c3e50; }
        details { margin-bottom: 15px; }
        summary { font-weight: bold; cursor: pointer; }
        img { max-width: 100%; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Linux 入门静态网页</h1>
    <p>这是一个示例静态网页，展示 Linux 基础知识。</p>

    <details>
        <summary>Linux 基本概念</summary>
        <p>Linux 是一个开源操作系统，广泛应用于服务器和嵌入式设备。</p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Tux.svg" alt="Linux Logo">
    </details>

    <details>
        <summary>Linux 文件系统</summary>
        <p>Linux 文件系统以 <code>/</code> 为根目录，常见目录有 /bin、/etc、/home 等。</p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/62/Linux_Filesystem_Hierarchy.svg" alt="文件系统结构">
    </details>

    <details>
        <summary>常用命令</summary>
        <ul>
            <li><code>ls</code> 列出目录内容</li>
            <li><code>cd</code> 切换目录</li>
            <li><code>mkdir</code> 创建目录</li>
            <li><code>rm</code> 删除文件或目录</li>
        </ul>
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/Linux_terminal.svg" alt="Linux 终端">
    </details>

    <footer>
        <p>© 2026 Linux 入门教程</p>
    </footer>
</body>
</html>
